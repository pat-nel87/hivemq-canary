apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: hivemq-canary
  namespace: flux-system
spec:
  interval: 5m
  path: ./deploy
  prune: true
  sourceRef:
    kind: GitRepository
    name: hivemq-canary
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: hivemq-canary
      namespace: default
  timeout: 2m
